<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        class Promise {
            // 构造方法
            constructor(executor) {
                // 添加属性
                this.PromiseState = 'pending'
                this.PromiseResult = null
                // 声明属性
                this.callbacks = []
                // 保存实例对象的this
                const self = this

                function resolve(data) {
                    // 判断状态 保证状态只更改一次
                    if (self.PromiseState !== 'pending') return
                    self.PromiseState = 'fulfilled' // 1.修改对象的状态(PromiseState)
                    self.PromiseResult = data // 2.设置对象结果值(PromiseResult)
                    // 异步调用成功的回调
                    setTimeout(() => {
                        self.callbacks.forEach(i => i.onResolved(data)) //onResolved 就是封装后的用户成功回调函数，它被存储在 callbacks 数组中，等待 resolve 被调用时执行。
                    });
                }

                function reject(data) {
                    if (self.PromiseState !== 'pending') return
                    self.PromiseState = 'rejected' // 1.修改对象的状态(PromiseState)
                    self.PromiseResult = data // 2.设置对象结果值(PromiseResult)
                    // 异步调用失败的回调
                    setTimeout(() => {
                        self.callbacks.forEach(i => i.onRejected(data))
                    });
                }

                try {
                    // 同步调用【执行器函数】
                    executor(resolve, reject)
                } catch (error) {
                    reject(error)
                }

            }

            // then方法
            then(onResolved, onRejected) {
                const self = this
                // 如果 onResolved/onRejected 不是函数, 可它指定一个默认的函数
                const onResolved = typeof onResolved === 'function' ? onResolved : v => v
                const onRejected = typeof onRejected === 'function' ? onRejected : (reason) => { throw reason }
             
                return new Promise((resolve, reject) => {
                // 封装函数
                function callback(onEvent) {
                    try {
                        let result = onEvent(self.PromiseResult)
                        // 判断
                        if (result instanceof Promise) {
                            // 如果返回结果是Promise类型的对象，PromiseState和PromiseResult由改对象决定
                            result.then(v => {
                            resolve(v)
                            }, r => {
                                reject(r)
                            })
                        } else {
                            // 返回的结果为非Promise对象，返回PromiseState为fufilled的Promise对象
                            // 结果的状态为成功
                            resolve(result)
                        }
                    } catch (error) {
                        reject(error)
                    }
                }

                // 调用回调函数
                if (this.PromiseState === 'fulfilled') {
                    setTimeout(() => {
                    callback(onResolved)
                    });

                }
                if (this.PromiseState === 'rejected') {
                    setTimeout(() => {
                    callback(onRejected)
                    });

                }
                // 异步
                if (this.PromiseState === 'pending') {
                    // 保存回调函数
                    this.callbacks.push({
                    onResolved: function () {
                        callback(onResolved)
                    },
                    onRejected: function () {
                        callback(onRejected)
                    }
                    })
                }
                })

            }

            // catch方法
            catch (onRejected) {
                return this.then(undefined, onRejected)
            }

            // resolve方法
            static resolve(data) {
                return new Promise((resolve, reject) => {
                try {
                    // 判断
                    if (data instanceof Promise) {
                        // 如果返回结果是Promise类型的对象，PromiseState和PromiseResult由改对象决定
                        data.then(v => {
                            resolve(v)
                        }, r => {
                            reject(r)
                        })
                    } else {
                        // 返回的结果为非Promise对象，返回PromiseState为fufilled的Promise对象
                        // 结果的状态为成功
                        resolve(data)
                    }
                } catch (error) {
                    reject(error)
                }
                })
            }

            // reject方法
            static reject(data) {
                return new Promise((resolve, reject) => {
                reject(data)
                })
            }

            // 添加all方法
            // 返回一个新的 promise
            // 只有所有的 promise 都成功才成功, 只要有一个失败了就直接失败
            // 如果都成功，返回的结果PromiseResult是三个成功结果形成的数组
            // 如果存在失败，直接失败，就返回的结果PromiseResult是第一个失败结果
            static all(promiseArr) {
                return new Promise((resolve, reject) => {
                let result = []
                let count = 0
                for (let i = 0; i < promiseArr.length; i++) {
                    promiseArr[i].then(
                        v => {
                            result[i] = v
                            count++
                            if (count === promiseArr.length) {
                            resolve(result)
                            }
                        },
                        r => {
                            reject(r)
                        }
                    )
                }
                })
            }

            // race方法
            // 返回一个新的 promise, 第一个完成的 promise 的结果状态就是最终的结果状态
            static race(promiseArr) {
                return new Promise((resolve, reject) => {
                for (let i = 0; i < promiseArr.length; i++) {
                    promiseArr[i].then(
                    v => {
                        resolve(v)
                    },
                    r => {
                        reject(r)
                    })
                }
                })
            }
            }

    </script>
</body>
</html>
