<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        
        class simplePromise {
            constructor(executor) {
                this.state = 'pending'
                this.value = undefined
                this.reason = undefined
                this.onFulfilledCallbacks = []
                this.onRejectedCallbacks = []

                const resolve = (value) => {
                    if (this.state === 'pending') {
                        this.state = 'fulfilled'
                        this.value = value
                        // 状态确定后，执行所有存储的成功回调
                        this.onFulfilledCallbacks.forEach((callback) => {
                            callback(this.value) // 为了简化，这里不考虑回调返回Promise的情况
                        })
                    }
                }

                const reject = (reason) => {
                    if (this.state === 'pending') {
                        this.state = 'rejected'
                        this.reason = reason
                        // 状态确定后，执行所有存储的失败回调
                        this.onRejectedCallbacks.forEach((callback) => {
                            callback(this.reason)
                        })
                    }
                }

                try {
                    // 立即执行 executor 函数
                    executor(resolve, reject)
                } catch (error) {
                    reject(error)
                }
            }

            then(onFulfilled, onRejected) {
                // 确保 onFulfilled 和 onRejected 是函数
                onFulfilled = typeof onFulfilled === 'function' ? onFulfilled : v => v
                onRejected = typeof onRejected === 'function' ? onRejected : reason => { throw reason }

                // then 方法必须返回一个新的 Promise
                return new simplePromise((resolve, reject) => {
                    // 定义处理成功回调并处理其返回值的逻辑
                    const handleFulfilled = (value) => {
                        try {
                            // 执行成功回调
                            const result = onFulfilled(value)
                            resolve(result)
                        } catch (error) {
                            reject(error)
                        }
                    }

                    // 定义处理失败回调并处理其返回值的逻辑
                    const handleRejected = (reason) => {
                        try {
                            // 执行失败回调
                            const result = onRejected(reason)
                            resolve(result)
                        } catch (error) {
                            reject(error)
                        }
                    }

                    if (this.state === 'fulfilled') {
                        // 如果当前 Promise 已成功，立即执行成功回调
                        // 使用 setTimeout 模拟异步，符合 Promise/A+ 的微任务要求 (简化版用 setTimeout 即可)
                        setTimeout(() => {
                            handleFulfilled(this.value)
                        }, 0)
                    } else if (this.state === 'rejected') {
                        // 如果当前 Promise 已失败，立即执行失败回调
                        setTimeout(() => {
                            handleRejected(this.reason)
                        }, 0)
                    } else {
                        // this.state === 'pending'，当前 Promise 仍在等待，将回调添加到队列
                        this.onFulfilledCallbacks.push(() => {
                            setTimeout(() => handleFulfilled(this.value), 0)
                        })
                        this.onRejectedCallbacks.push(() => {
                            setTimeout(() => handleRejected(this.reason), 0)
                        })
                    }
                })
            }
        }


        // 测试
        const promise = new simplePromise((resolve,reject)=>{
            setTimeout(()=>{
                resolve('成功了')
            },1000)
        })
        promise.then(result => {
            console.log("第一个then - 成功:", result);
            return result + " -> 链式调用"; // 返回一个普通值
        }, error => {
            console.log("第一个then - 失败:", error);
            throw new Error("新的错误: " + error); // 抛出错误
        })
        .then(result => {
            console.log("第二个then - 成功:", result);
        })
        .catch(error => { // 简化版可能不实现 catch，但概念上它是 .then(undefined, onRejected) 的语法糖
            console.log("全局catch - 捕获到错误:", error);
        });
    </script>
</body>

</html>
