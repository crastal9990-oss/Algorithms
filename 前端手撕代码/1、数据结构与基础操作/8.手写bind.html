<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // bind 的实现稍微复杂一点，因为它不立即执行，而是返回一个新函数，并且它支持柯里化（参数可以分批传）。
        // 还需要考虑一个极端边界情况：如果返回的新函数被当做构造函数配合 new 使用，绑定的 this 应该失效，而是指向 new 创建出来的新实例。
        
        Function.prototype.myBind = function(context, ...args) {
            // 1. 防御性编程：调用 bind 的必须是一个函数
            if (typeof this !== 'function') {
                throw new TypeError('Bind must be called on a function');
            }

            // 2. 保存原函数的引用
            const originalFn = this;

            // 3. 返回一个新的函数
            return function boundFn(...newArgs) {
                // 4. 处理 new 关键字的边界情况
                // 如果被 new 调用，此时内部的 this 指向新创建的实例 (this instanceof boundFn)
                // 这种情况下，原样调用原函数，忽略传入的 context
                if (this instanceof boundFn) {
                    return new originalFn(...args, ...newArgs);
                }

                // 5. 正常调用：利用 apply 绑定 context，并将前后两次传的参数拼接到一起
                return originalFn.apply(context, [...args, ...newArgs]);
            };
        };

        // 测试
        function sayHi3(greeting) {
            console.log(`${greeting}, ${this.name}`);
        }
        const obj3 = { name: 'Alice', age: 25 };
        const boundSayHi = sayHi3.myBind(obj3, 'Hello');
        boundSayHi(); // 输出: Hello, Alice
    </script>
</body>
</html>
