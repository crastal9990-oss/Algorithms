    如果目标值不存在于数组中，返回它将会被按顺序插入的位置。 */

    /* 二分法 */
    var searchInsert = function (nums, target) {
      const n = nums.length
      let left = 0, right = n - 1, ans = n
      while (left <= right) {
        let mid = ((right - left) >> 1) + left
        if (target <= nums[mid]) {
          ans = mid
          right = mid - 1
        } else {
          left = mid + 1
        }
      }
      return ans
    };

    const a = searchInsert([1,3,5,6], 5)
    console.log(a);
