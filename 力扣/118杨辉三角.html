<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var rob = function(numRows) {
            let ret = []

            for(let i = 0; i < numRows; i++){
                let row = new Array(i+1).fill(1)

                for(let j = 1; j < i; j++){
                    row[j] = ret[i-1][j-1] + ret[i-1][j]
                }

                ret.push(row)
            }
            return ret
        };
    </script>
</body>
</html>
