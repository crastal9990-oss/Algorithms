  <script>
    var productExceptSelf = function (nums) {
      const n = nums.length
      const re = []
      const pre = []
      pre[0] = 1
      const sub = []
      sub[n-1] = 1

      for(let i = 1; i < n; i++) {
        pre[i] = pre[i-1] * nums[i-1] 
      }

      for(let j = n-2; j >= 0; j--) {
        sub[j] = sub[j+1] * nums[j+1]
      }

      for(let k = 0; k < n; k++ ){
        re[k] = pre[k] * sub[k]
      }
      console.log(pre);
      console.log(sub);
      
      return re
    };

    const nums = [-1, 1, 0, -3, 3]
    console.log(productExceptSelf(nums));
