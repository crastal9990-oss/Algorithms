<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      var maxProduct = function (nums) {
        if (nums.length === 0) return nums[0];

        const n = nums.length;
        let max = new Array(n);
        let min = new Array(n);

        max[0] = min[0] = nums[0];
        for (let i = 1; i < nums.length; i++) {
          max[i] = Math.max(
            nums[i],
            max[i - 1] * nums[i],
            min[i - 1] * nums[i],
          );
          min[i] = Math.min(
            nums[i],
            max[i - 1] * nums[i],
            min[i - 1] * nums[i],
          );
        }

        return Math.max(...max);
      };

      const nums = [2, 3, -2, 4];
      console.log(maxProduct(nums));
    </script>
  </body>
</html>
