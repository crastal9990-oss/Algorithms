<body>
  
  <script>
    var firstMissingPositive = function (nums) {
      nums.sort((a,b) => a-b) // 从小到大排列
      if(!nums.includes(1)) return 1 // 没有1
      else {
        const arr = nums.filter(item => item >= 1)
        //console.log(arr);
        for(let i = 0; i < arr.length; i++) {
          //console.log(arr[i]);
          
          if(arr[i] + 1 !== arr[i+1] && arr[i] !== arr[i+1]) return arr[i] + 1
        }
      }   
    };

    //const nums = [0, 2, 2, 1, 1]
    //const nums = [3, 4, -1, 1]
    const nums = [3, 4, -1, 1]
    console.log(firstMissingPositive(nums));
    
  </script>
</body>
