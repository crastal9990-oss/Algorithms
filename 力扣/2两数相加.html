  /**
   * Definition for singly-linked list.
   * function ListNode(val, next) {
   *     this.val = (val===undefined ? 0 : val)
   *     this.next = (next===undefined ? null : next)
   * }
   */
  /**
   * @param {ListNode} l1
   * @param {ListNode} l2
   * @return {ListNode}
   */
  var addTwoNumbers = function (l1, l2) {
    let total = l1.val + l2.val
    let next1 = Math.floor(total / 10)
    let res = new ListNode(total % 10)

    if (l1.next !== null || l2.next !== null || next1 !== 0) {
      l1 = l1.next ? l1.next : new ListNode(0)
      l2 = l2.next ? l2.next : new ListNode(0)

      l1.val = l1.val + next1
      res.next = addTwoNumbers(l1, l2)
    }
    return res
  };
