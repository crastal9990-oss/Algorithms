<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var climbStairs = function (n) {
        let p = 0;
        let q = 0;
        let r = 1;
        for (let i = 1; i <= n; i++) {
          p = q;
          q = r;
          r = p + q;
        }
        return r;
      };

      const n = 5;
      console.log(climbStairs(n));
    </script>
  </body>
</html>
