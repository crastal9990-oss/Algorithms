<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var topKFrequent = function (nums, k) {
        const map = new Map();

        for (let i = 0; i < nums.length; i++) {
          // 返回一个布尔值，用来表明 Map 对象中是否存在与指定的键 key 关联的值
          if (map.has(nums[i])) {
            let temp = map.get(nums[i]); //返回与指定的键 key 关联的值
            map.delete(nums[i]); // 删除旧的键
            map.set(nums[i], temp + 1);
          } else {
            map.set(nums[i], 1);
          }
        }
        //console.log(map); // map:[nums[i]的值，出现次数]
        //console.log(Array.from(map.entries())); // [[1,4], [3,2], [2,4]];

        // 转换为数组 => 排序 => 取前k个
        let array = Array.from(map.entries())
          .sort((a, b) => b[1] - a[1])
          .slice(0, k);
        //console.log(array);

        let result = array.map((item) => item[0]); // 只取键

        return result;
      };

      const nums = [1, 2, 1, 2, 1, 2, 3, 1, 3, 2],
        k = 2;
      console.log(topKFrequent(nums, k));
    </script>
  </body>
</html>
