      var moveZeroes = function (nums) {
        let i = 0;
        for (let x of nums) {
          if (x !== 0) nums[i++] = x;
        }
        nums.fill(0, i);

        return nums;
      };

      const nums = [0, 0, 0, 1];
      console.log(moveZeroes(nums));
