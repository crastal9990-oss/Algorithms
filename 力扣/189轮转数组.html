      var rotate = function (nums, k) {
        let n = nums.length;
        let newArray = [];

        for (let i = 0; i < nums.length; i++) {
          newArray[(i + k) % n] = nums[i];
        }

        for (let j = 0; j < nums.length; j++) {
          nums[j] = newArray[j];
        }

        return nums;
      };

      const nums = [1, 2, 3, 4, 5, 6, 7];
      const k = 3;
      console.log(rotate(nums, k));
